<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- 폴더 뒷면 glass fill -->
    <linearGradient id="glassBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.30)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>

    <!-- 폴더 앞면 glass fill -->
    <linearGradient id="glassFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.38)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.14)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.22)"/>
    </linearGradient>

    <!-- 폴더 앞면 상단 반사광 -->
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.0)"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.20)"/>
    </filter>

    <!-- 폴더 앞면 클리핑 (반사광 영역 제한) -->
    <clipPath id="frontClip">
      <path d="
        M 59 136
        L 159 136
        Q 169 136  171 126
        L 189 80
        Q 193 70  183 70
        L 83 70
        Q 73 70  71 80
        L 53 126
        Q 49 136  59 136
        Z
      "/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="256" height="256" rx="55" fill="url(#bg)"/>
  <rect x="10" y="10" width="236" height="236" rx="47"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- ── 폴더 (glass 테마) ── -->
  <g filter="url(#shadow)">

    <!-- 폴더 뒷면: 탭 + 반듯한 몸체 (120px) -->
    <path d="
      M 49 52
      Q 49 42  59 42
      L 83 42
      Q 91 42  95 48
      L 101 56
      L 159 56
      Q 169 56  169 66
      L 169 126
      Q 169 136  159 136
      L 59 136
      Q 49 136  49 126
      Z
    " fill="url(#glassBack)"
      stroke="rgba(255,255,255,0.40)" stroke-width="2"/>

    <!-- 폴더 앞면: 평행사변형 (하단 120px = 뒷면과 동일) -->
    <path d="
      M 59 136
      L 159 136
      Q 169 136  171 126
      L 189 80
      Q 193 70  183 70
      L 83 70
      Q 73 70  71 80
      L 53 126
      Q 49 136  59 136
      Z
    " fill="url(#glassFront)"
      stroke="rgba(255,255,255,0.45)" stroke-width="2"/>

    <!-- 앞면 상단 반사광 (glass 효과) -->
    <rect x="73" y="70" width="120" height="22"
          fill="url(#glassShine)" clip-path="url(#frontClip)"/>
  </g>

  <!-- ── 손: 검지 펴고 나머지 접은 터치 손 ── -->
  <g filter="url(#shadow)">
    <g transform="translate(107, 70) scale(0.88)">

      <!-- 손 실루엣 채우기 -->
      <path d="
        M 34 118
        L 34 31
        Q 34 19  44 19
        Q 54 19  54 31
        L 54 98
        L 54 74
        Q 54 64  64 64
        Q 74 64  74 74
        L 74 98
        L 74 78
        Q 74 68  84 68
        Q 94 68  94 78
        L 94 98
        L 94 84
        Q 94 74  104 74
        Q 114 74  114 84
        L 114 102
        L 114 140
        Q 114 158  98 164
        L 48 164
        Q 28 164  20 148
        Q 16 121  18 105
        Q 18 93  34 93
        Z
      " fill="rgba(230,220,255,0.85)" stroke="none"/>

      <!-- 손 외곽선 + 디테일 -->
      <g fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">

        <!-- 검지 -->
        <path d="
          M 34 118
          L 34 31
          Q 34 19  44 19
          Q 54 19  54 31
          L 54 98
        "/>

        <!-- 중지 -->
        <path d="
          M 54 98
          L 54 74
          Q 54 64  64 64
          Q 74 64  74 74
          L 74 98
        "/>

        <!-- 약지 -->
        <path d="
          M 74 98
          L 74 78
          Q 74 68  84 68
          Q 94 68  94 78
          L 94 98
        "/>

        <!-- 새끼 -->
        <path d="
          M 94 98
          L 94 84
          Q 94 74  104 74
          Q 114 74  114 84
          L 114 102
        "/>

        <!-- 손바닥 + 엄지 -->
        <path d="
          M 114 102
          L 114 140
          Q 114 158  98 164
          L 48 164
          Q 28 164  20 148
          Q 16 121  18 105
          Q 18 93  34 93
        "/>
      </g>
    </g>
  </g>

  <!-- 터치 동심원 -->
  <circle cx="146" cy="95" r="16"  fill="none" stroke="white" stroke-width="2"   opacity="0.50"/>
  <circle cx="146" cy="95" r="28" fill="none" stroke="white" stroke-width="1.5" opacity="0.28"/>
  <circle cx="146" cy="95" r="40" fill="none" stroke="white" stroke-width="1"   opacity="0.14"/>
</svg>
